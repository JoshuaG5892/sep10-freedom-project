<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>

      <!-- Camera -->
      <a-camera position="0 1.6 5"></a-camera>

      <!-- Robot -->
      <a-entity id="robot" position="0 0 -3">

        <!-- Body -->
        <a-box position="0 1 0" depth="0.5" height="1.5" width="1" color="blue"></a-box>

        <!-- Head -->
        <a-sphere position="0 2 0" radius="0.4" color="lightblue"></a-sphere>

        <!-- Left Arm -->
        <a-cylinder position="-0.8 1 0" radius="0.1" height="1" color="gray"></a-cylinder>

        <!-- Right Arm -->
        <a-cylinder position="0.8 1 0" radius="0.1" height="1" color="gray"></a-cylinder>

        <!-- Legs -->
        <a-cylinder position="-0.3 0 0" radius="0.15" height="1" color="black"></a-cylinder>
        <a-cylinder position="0.3 0 0" radius="0.15" height="1" color="black"></a-cylinder>

      </a-entity>

    </a-scene>
  </body>
</html>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="50" height="50" color="#7BC8A4"></a-plane>
       <a-sky color="#2C3E50"></a-sky>
    </a-scene>
  </body>
</html>
